<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encuesta La Rousse</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <div class="header">
    <img src="logo.png" alt="La Rousse">
  </div>

  <h2>Tu opinión nos ayuda a mejorar. Te tomará menos de 1 minuto.</h2>

  <form id="form">

    <!-- SUCURSAL -->
    <label>Sucursal</label>
    <select name="sucursal" required>
      <option value="">Selecciona sucursal</option>
      <option value="Camelinas">Camelinas - Morelia</option>
      <option value="Centro">Centro - Morelia</option>
      <option value="Lazaro">Lázaro - Morelia</option>
      <option value="Pepsi">Pepsi - Morelia</option>
      <option value="Poniente">Poniente - Morelia</option>
      <option value="Gran Plaza">Gran Plaza - León</option>
      <option value="Del Rio">Del Río - León</option>
    </select>

    <!-- EXPERIENCIA -->
    <label>¿Cómo fue tu experiencia en tienda?</label>
    <select name="experiencia" required>
      <option value="">Selecciona</option>
      <option value="10">10 - Excelente</option>
      <option value="9">9</option>
      <option value="8">8</option>
      <option value="7">7</option>
      <option value="6">6</option>
      <option value="5">5</option>
      <option value="4">4</option>
      <option value="3">3</option>
      <option value="2">2</option>
      <option value="1">1 - Muy mala</option>
    </select>

    <input name="comentario_experiencia" placeholder="¿Qué podríamos mejorar?">

    <!-- ATENCIÓN -->
    <label>¿Cómo fue la atención del colaborador?</label>
    <select name="atencion" required>
      <option value="">Selecciona</option>
      <option value="10">10 - Excelente</option>
      <option value="9">9</option>
      <option value="8">8</option>
      <option value="7">7</option>
      <option value="6">6</option>
      <option value="5">5</option>
      <option value="4">4</option>
      <option value="3">3</option>
      <option value="2">2</option>
      <option value="1">1 - Muy mala</option>
    </select>

    <input name="colaborador" placeholder="¿Quién te atendió? (opcional)">
    <input name="comentario_atencion" placeholder="¿Qué podría mejorar el colaborador?">

    <!-- PRODUCTOS -->
    <input name="productos_deseados" placeholder="¿Qué te gustaría encontrar en tu próxima visita?">

    <!-- RECOMENDACIÓN -->
    <label>¿Recomendarías la tienda?</label>
    <select name="recomendaria">
      <option value="">Selecciona</option>
      <option value="si">Sí</option>
      <option value="no">No</option>
    </select>

    <button type="submit">Enviar</button>

  </form>

</div>

<script>
document.getElementById("form").addEventListener("submit", async e=>{
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  await fetch("https://script.google.com/macros/s/AKfycbyIBUbbeXZ2Qv6TakTC9BP0SixXCR2LWwu7di9l9IAUOdRq-rzjWRyQmHVcC6SDG8Zv/exec", {
    method:"POST",
    body: JSON.stringify(data)
  });

  alert("Gracias por tu opinión 🙌");
  e.target.reset();
});
</script>

</body>
</html>
