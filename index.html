<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encuesta La Rousse</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

  <div class="header">
    <img src="logo.png" alt="La Rousse">
  </div>

  <h2>Tu opinión nos ayuda a mejorar. Te tomará menos de 1 minuto.</h2>

  <form id="form">

    <!-- ===================== -->
    <!-- CARD 1 (CAJERO) -->
    <!-- ===================== -->
    <div id="card1">

      <label>Sucursal</label>
      <select name="sucursal" required>
        <option value="">Selecciona sucursal</option>
        <option value="Camelinas">Camelinas - Morelia</option>
        <option value="Centro">Centro - Morelia</option>
        <option value="Lazaro">Lázaro - Morelia</option>
        <option value="Pepsi">Pepsi - Morelia</option>
        <option value="Poniente">Poniente - Morelia</option>
        <option value="Gran Plaza">Gran Plaza - León</option>
        <option value="Del Rio">Del Río - León</option>
      </select>

      <input name="colaborador" placeholder="¿Quién te atendió?" required>

      <button type="button" id="btnContinuar">Continuar</button>

    </div>


    <!-- ===================== -->
    <!-- CARD 2 (CLIENTE) -->
    <!-- ===================== -->
    <div id="card2" style="display:none;">

      <!-- EXPERIENCIA -->
      <label>¿Cómo ha sido tu experiencia en nuestra tienda hoy?</label>
      <select name="experiencia" required>
        <option value="">Selecciona una opción</option>
        <option value="Excelente">Excelente</option>
        <option value="Bueno">Bueno</option>
        <option value="Regular">Regular</option>
        <option value="Malo">Malo</option>
        <option value="Muy malo">Muy malo</option>
      </select>

      <input name="comentario_experiencia" placeholder="¿Qué podríamos mejorar?">

      <!-- ATENCIÓN -->
      <label for="atencion">
        ¿Cómo califica la atención de la persona que lo atendió?
      </label>

      <select name="atencion" id="atencion" required>
        <option value="">Selecciona una opción</option>
        <option value="Excelente">Excelente</option>
        <option value="Bueno">Bueno</option>
        <option value="Regular">Regular</option>
        <option value="Malo">Malo</option>
        <option value="Muy malo">Muy malo</option>
      </select>

      <!-- CHECKBOX -->
      <div id="comentario_atencion_container">

        <label>¿Qué considera le faltó al colaborador para mejorar su atención?</label>

        <div class="checkbox-group">

          <label class="checkbox-card">
            <input type="checkbox" name="comentario_atencion" value="Amabilidad">
            <span>Amabilidad</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="comentario_atencion" value="Imagen">
            <span>Imagen</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="comentario_atencion" value="Disposición">
            <span>Disposición</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="comentario_atencion" value="Sonrisa">
            <span>Sonrisa</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="comentario_atencion" value="Actitud">
            <span>Actitud</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="comentario_atencion" value="Capacitación">
            <span>Capacitación</span>
          </label>

        </div>

      </div>

      <!-- PRODUCTOS -->
      <input name="productos_deseados" placeholder="¿Qué te gustaría encontrar en tu próxima visita?">

      <!-- RECOMENDACIÓN -->
      <label>¿Recomendaría visitar la tienda a familiares y amigos?</label>

      <div class="range-wrap">
        <input
          type="range"
          id="recomendacion"
          name="recomendacion"
          min="1"
          max="10"
          value="10"
          step="1"
          required
          oninput="document.getElementById('recomendacionValor').textContent = this.value"
        >
        <div class="range-value">
          Probabilidad de recomendación: <span id="recomendacionValor">10</span>
        </div>
      </div>

      <select name="precios" required>
        <option value="">¿Qué opinas de nuestros precios respecto a otras tiendas?</option>
        <option value="mejor">Mucho mejores</option>
        <option value="similar">Similar a otras tiendas</option>
        <option value="peor">Peor que otras tiendas</option>
      </select>

      <button type="submit">Enviar</button>

    </div>

  </form>

</div>

<script>
const form = document.getElementById("form");

// ===== CAMBIO DE CARDS =====
const btnContinuar = document.getElementById("btnContinuar");
const card1 = document.getElementById("card1");
const card2 = document.getElementById("card2");

btnContinuar.addEventListener("click", () => {

  const sucursal = document.querySelector('[name="sucursal"]').value;
  const colaborador = document.querySelector('[name="colaborador"]').value;

  if (!sucursal || !colaborador) {
    alert("Completa sucursal y colaborador");
    return;
  }

  card1.style.display = "none";
  card2.style.display = "block";
});


// ===== SUBMIT =====
form.addEventListener("submit", async e => {
  e.preventDefault();

  const formData = new FormData(form);

  const checks = Array.from(
    document.querySelectorAll('input[name="comentario_atencion"]:checked')
  ).map(cb => cb.value);

  formData.set("comentario_atencion", checks.join(", "));

  if (!formData.get("sucursal") || !formData.get("experiencia") || !formData.get("atencion")) {
    alert("Completa los campos obligatorios");
    return;
  }

  try {
    const params = new URLSearchParams(formData);

    await fetch("https://script.google.com/macros/s/AKfycbwVAgaP03ih4f732oWuIez9FQybiGBEa_vyz21KKOHk47IJIkZDv6uVKRa2R9dW8Ck/exec", {
      method: "POST",
      body: params
    });

    alert("Gracias por tu opinión 🙌");
    form.reset();
    card2.style.display = "none";
    card1.style.display = "block";

  } catch (error) {
    alert("Error al enviar. Intenta de nuevo.");
    console.error(error);
  }
});


// ===== LÓGICA ATENCIÓN (NUEVA) =====
const atencionInput = document.getElementById("atencion");
const comentarioContainer = document.getElementById("comentario_atencion_container");

function toggleComentario() {
  const valor = atencionInput.value;

  if (valor !== "Excelente" && valor !== "") {
    comentarioContainer.style.display = "block";
  } else {
    comentarioContainer.style.display = "none";
  }
}

toggleComentario();
atencionInput.addEventListener("change", toggleComentario);

</script>

</body>
</html>
